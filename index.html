// ── 遊戲基本常數 ──
// GY      : 地面 Y 座標（像素），角色腳底對齊此線
// LW      : 關卡總寬度（像素），地圖從 x=0 延伸至 x=LW
// PW / PH : 主角碰撞箱寬 / 高（像素）
// GRAV    : 每幀重力加速度（向下累加至 vy）
// JFORCE  : 跳躍瞬間給予的向上速度（負值 = 向上）
// SPD     : 左右移動速度（像素/幀）
// TOTAL_COINS : 地圖上的金幣總數
const GY=395, LW=3500, PW=30, PH=72;
const GRAV=0.55, JFORCE=-13.5, SPD=4.3;
const TOTAL_COINS=20;

// ── 全域遊戲狀態 ──
// score     : 當前分數（撿金幣+100、踩敵人+200、過關+1000+金幣獎勵）
// lives     : 剩餘生命數（預設 4，歸零時切換為 gameover）
// coinsCnt  : 已收集金幣數量
// gameState : 遊戲狀態字串 'start' | 'playing' | 'win' | 'gameover'
// camX      : 攝影機（視窗）左緣在世界座標的 x 位置
let score=0, lives=4, coinsCnt=0, gameState='start', camX=0;
// keys 物件以「按鍵名稱 → 是否按住」的方式記錄鍵盤狀態，
// 讓 update() 能在每幀查詢而不依賴事件時序。
const keys={};
window.addEventListener('keydown', e=>{
  keys[e.key]=true;
  // 阻止方向鍵與空白鍵的預設捲頁行為，避免畫面跳動
  if(['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  // 非遊戲中按 R / r 重置遊戲
  if((e.key==='r'||e.key==='R') && gameState!=='playing') resetGame();
  // 開始畫面按 Enter 正式進入遊戲
  if(e.key==='Enter' && gameState==='start'){ gameState='playing'; }
});
// 放開按鍵時將對應旗標清除
window.addEventListener('keyup', e=>{ keys[e.key]=false; });

// ── 主角物件 ──
// mkPlayer() 建立一個全新的主角狀態物件：
//   x, y        : 碰撞箱左上角世界座標，初始位置在地面左側
//   vx, vy      : 水平 / 垂直速度（像素/幀）
//   onGround    : 是否站在地面或平台上（用於判斷能否跳躍）
//   facing      : 朝向，1 = 朝右，-1 = 朝左（影響繪製翻轉）
//   wFrame      : 行走動畫幀計數器（驅動腿部擺動 sin 函數）
//   wTimer      : 行走幀率控制（每 6 幀推進一次 wFrame）
//   invTimer    : 無敵幀數計時器（受傷後 90 幀內閃爍且免疫傷害）
let player;
function mkPlayer(){
  return { x:80, y:GY-PH, vx:0, vy:0, onGround:false,
           facing:1, wFrame:0, wTimer:0, invTimer:0 };
}

// ── 天降嬰兒機制 ──
// 每隔約 SKY_INTERVAL（160 幀≈2.7 秒）+ 隨機偏移，
// 從畫面頂端隨機 x 位置生成一隻「掉落中」的嬰兒（falling:true）。
// 空中同時存在的天降嬰兒上限為 6 隻，避免畫面過於混亂。
// 著地後 falling 轉 false，成為普通地面爬行敵人。
let skyTimer=0;
const SKY_INTERVAL=160; // 基礎幀間距（~2.7 秒）
function spawnSkyBaby(){
  if(enemies.filter(e=>e.alive&&e.falling).length>=6) return; // cap sky babies
  const x=camX+60+Math.random()*(W-120);
  enemies.push({
    x:Math.max(50,Math.min(LW-100,x)),
    y:-55, vx:Math.random()>0.5?-1.4:1.4,
    vy:2.5, w:52, h:34, alive:true, ct:0, falling:true
  });
}

// drawGoal() 在此範圍內繪製圍欄、超大粉紅豬與終點旗幟。
const goal={x:3300,y:GY-130,w:200,h:130};

// ── 背景雲朵定義 ──

const clouds=Array.from({length:16},(_,i)=>({

}));

// ══ 碰撞偵測系統 ══

// aabb()：AABB（軸對齊包圍盒）重疊測試。
// 傳入兩個矩形的左上座標與寬高，回傳 true 表示有重疊。
function aabb(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// resolve()：計算移動物件（px,py,pw,ph）與平台（p）的碰撞深度，
// 並回傳推出方向物件 {axis, dir}，用於修正位置：
//   axis='y', dir=-1 → 從上方碰撞（站在平台頂部）
//   axis='y', dir=+1 → 從下方碰撞（頭頂碰到平台底部）
//   axis='x', dir=-1 / +1 → 水平碰撞（左/右牆）
// 若無碰撞則回傳 null。
function resolve(px,py,pw,ph,p){
  if(!aabb(px,py,pw,ph,p.x,p.y,p.w,p.h)) return null;
  const dx1=(px+pw)-p.x, dx2=(p.x+p.w)-px; // 左右穿透深度
  const dy1=(py+ph)-p.y, dy2=(p.y+p.h)-py; // 上下穿透深度
  const ox=Math.min(dx1,dx2), oy=Math.min(dy1,dy2);
  // 選擇穿透深度較小的軸作為推出方向（最短距離推出法）
  if(oy<ox) return {axis:'y',dir:dy1<dy2?-1:1};
  return      {axis:'x',dir:dx1<dx2?-1:1};
}

// ══ 每幀更新邏輯 ══
// update() 在 gameState==='playing' 時由主迴圈 loop() 每幀呼叫一次。
function update(){
  // ── 水平移動輸入 ──
  // 按左/右箭頭鍵設定速度並更新朝向；放開則摩擦力減速（×0.72/幀）
  if(keys['ArrowLeft'])  { player.vx=-SPD; player.facing=-1; }
  else if(keys['ArrowRight']){ player.vx=SPD; player.facing=1; }
  else player.vx*=0.72; // 自然慣性減速

  // ── 跳躍輸入 ──
  // 只有站在地面上才能跳（防止二段跳）
  if(keys[' '] && player.onGround){
    player.vy=JFORCE; player.onGround=false;
  }

  // ── 物理積分 ──
  // 重力每幀累加至 vy，並限制最大落速為 20（終端速度，防止穿越薄平台）
  player.vy=Math.min(player.vy+GRAV,20);
  player.x+=player.vx; player.y+=player.vy;
  // 水平邊界限制：不可超出地圖左右邊緣
  player.x=Math.max(0,Math.min(player.x,LW-PW));

  // ── 平台碰撞解算 ──
  // 每幀先假設主角不在地面，再逐一與平台做碰撞推出
  player.onGround=false;
  for(const p of platforms){
    const col=resolve(player.x,player.y,PW,PH,p);
    if(!col) continue;
    if(col.axis==='y'){
      if(col.dir===-1){ player.y=p.y-PH; player.vy=0; player.onGround=true; } // 落在平台頂
      else            { player.y=p.y+p.h; player.vy=0; }                       // 撞到平台底
    } else {
      if(col.dir===-1) player.x=p.x-PW;  // 撞到平台左牆
      else             player.x=p.x+p.w; // 撞到平台右牆
      player.vx=0; // 碰壁後速度歸零
    }
  }

  // 主角掉出畫面下方（落入坑洞）→ 觸發復活
  if(player.y>H+60) respawn();
  // 無敵計時器倒數（>0 時主角閃爍且免疫傷害）
  if(player.invTimer>0) player.invTimer--;

  // ── 行走動畫計時器 ──
  // 在地面且有水平速度時，每 6 幀推進一次 wFrame，
  // wFrame 傳入 sin() 產生腿部擺動效果
  if(player.onGround&&Math.abs(player.vx)>0.4){
    if(++player.wTimer>6){ player.wFrame++; player.wTimer=0; }
  }

  // ── 金幣撿取偵測 ──
  // 每幀檢查主角（稍微擴大的碰撞框）是否觸碰金幣中心 20×20 的範圍。
  // 碰到後標記 got=true（不再繪製）、增加分數、產生金色粒子。
  coins.forEach(c=>{
    if(c.got) return; // 已撿過則跳過
    if(aabb(player.x-6,player.y,PW+12,PH,c.x-10,c.y-10,20,20)){
      c.got=true; coinsCnt++; score+=100;
      spawnPfx(c.x,c.y,'#FFD700'); updateUI();
    }
  });

  // ── 天降嬰兒計時 ──
  // 每幀累加 skyTimer，達到 160+隨機80 幀後生成一隻天降嬰兒並重置計時器
  skyTimer++;
  if(skyTimer >= SKY_INTERVAL + Math.random()*80){
    skyTimer=0;
    spawnSkyBaby();
  }

  // ── 嬰兒敵人更新 ──
  enemies.forEach(e=>{
    if(!e.alive) return; // 已死亡跳過
    e.ct++; // 動畫計數器（用於腿部/手臂擺動的 sin 輸入）
    // 重力積分，終端速度同樣限制為 20
    e.vy=Math.min(e.vy+GRAV,20);
    e.x+=e.vx; e.y+=e.vy;
    // 與所有平台做碰撞偵測：垂直碰撞→著地，水平碰撞→反向
    for(const p of platforms){
      const col=resolve(e.x,e.y,e.w,e.h,p);
      if(!col) continue;
      if(col.axis==='y'&&col.dir===-1){
        e.y=p.y-e.h; e.vy=0;
        e.falling=false; // 天降嬰兒著地後轉為普通爬行狀態
      } else if(col.axis==='x') e.vx*=-1; // 碰壁反向
    }
    // 地圖左右邊界反向
    if(e.x<0||e.x+e.w>LW) e.vx*=-1;
    // 掉出畫面下方（坑洞）→ 標記為死亡
    if(e.y>H+60) e.alive=false;

    // 無敵期間不受傷害
    if(player.invTimer>0) return;
    if(aabb(player.x,player.y,PW,PH,e.x,e.y,e.w,e.h)){
      // 踩踏判定：主角 vy>0（正在下落）且腳底在嬰兒上半部以上
      if(player.vy>0 && player.y+PH < e.y+e.h*0.6){
        e.alive=false; player.vy=-9; score+=200;  // 踩死並反彈
        spawnPfx(e.x+26,e.y,'#FFB3C1'); updateUI();
      } else {
        respawn(); // 其他碰撞方式 → 主角受傷
      }
    }
  });

  // ── 過關判定 ──
  // 主角碰觸終點圍欄範圍 → 過關，給予 1000 基礎分 + 每枚金幣 50 分
  if(aabb(player.x,player.y,PW,PH,goal.x,goal.y,goal.w,goal.h)){
    score+=1000+coinsCnt*50; gameState='win'; updateUI();
  }

  // ── 粒子更新 ──
  // 移除 life≤0 的粒子，其餘每幀移動位置並施加輕微重力
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; });

  // ── 攝影機跟隨 ──
  // 攝影機 x 使主角維持在畫面左側 1/3 處，並限制在地圖邊界內
  camX=Math.max(0,Math.min(player.x-W/3,LW-W));
  // 更新進度條（主角 x 位置 / 地圖總長，顯示為百分比）
  document.getElementById('pg').textContent=
    Math.min(100,Math.round((player.x/LW)*100))+'%';
}

// spawnPfx()：在 (x, y) 產生 8 顆向四面八方飛散的粒子，
// 每顆初速方向均勻分布在 360°，存活 28 幀後消失。
function spawnPfx(x,y,color){
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2; // 均勻角度（弧度）
    particles.push({x,y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5-2,life:28,color});
  }
}
// respawn()：主角受傷後的復活處理。
// 先扣除一條命，命數歸零則切換 gameover。
// 否則將主角重置至起點，並給予 90 幀無敵時間（避免連續受傷）。
function respawn(){
  if(--lives<=0){ gameState='gameover'; updateUI(); return; }
  player.x=80; player.y=GY-PH; player.vx=0; player.vy=0;
  camX=0; player.invTimer=90; updateUI();
}
// updateUI()：同步更新 HTML 頂部 UI 欄的分數、生命、金幣數字。
// 每次分數/生命/金幣改變後呼叫以保持顯示最新。
function updateUI(){
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent=lives;
  document.getElementById('cn').textContent=coinsCnt+'/'+TOTAL_COINS;
}

// ══ 繪圖輔助函數 ══

// rr()：繪製圓角矩形（Rounded Rectangle）並 fill。
// x, y : 左上角；w, h : 寬高；r : 圓角半徑。
// 使用 arcTo 在四個角落繪製弧線，避免手動計算貝茲曲線。
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath(); ctx.fill();
}

// ── 背景繪製 ──
// drawBg() 每幀繪製整個背景場景（天空漸層、太陽、遠山、雲朵）。
// 背景元素使用視差捲動（parallax）：
//   遠景山脈 × 0.10、次遠山 × 0.18、雲朵 × 0.22
// 比地面物件（× 1.0）移動慢，製造深度感。
function drawBg(){
  // 天空漸層：頂部深藍 → 中段淡藍 → 底部草綠
  const gr=ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0,'#64B5F6'); gr.addColorStop(0.65,'#B3E5FC'); gr.addColorStop(1,'#DCEDC8');
  ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  // 太陽：中心黃色圓 + 外圍半透明光暈
  ctx.fillStyle='#FFEB3B';
  ctx.beginPath(); ctx.arc(130,85,42,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,235,59,0.2)';
  ctx.beginPath(); ctx.arc(130,85,62,0,Math.PI*2); ctx.fill();
  // 遠景淡藍山脈（視差係數 0.10，移動最慢，9 個三角形無縫循環）
  ctx.fillStyle='#90CAF9';
  const mo1=-camX*0.1; // 視差偏移量
  for(let i=0;i<9;i++){
    const mx=((i*500+mo1)%(W+700))-200; // 循環位置計算
    ctx.beginPath(); ctx.moveTo(mx,H-60); ctx.lineTo(mx+200,H-310);
    ctx.lineTo(mx+400,H-60); ctx.closePath(); ctx.fill();
  }
  // 次遠景灰藍山脈（視差係數 0.18，10 個三角形）
  ctx.fillStyle='#B0BEC5';
  const mo2=-camX*0.18;
  for(let i=0;i<10;i++){
    const mx=((i*380+mo2+190)%(W+550))-150;
    ctx.beginPath(); ctx.moveTo(mx,H-60); ctx.lineTo(mx+150,H-230);
    ctx.lineTo(mx+300,H-60); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.9)';
  clouds.forEach(c=>{
    const cx=((c.x-camX*0.22)%(W+300)+W+300)%(W+300)-150;
    drawCloud(cx,c.y,c.w);
  });
}
function drawCloud(x,y,w){
  ctx.beginPath();
  ctx.arc(x,y+w*0.3,w*0.42,0,Math.PI*2);
  ctx.arc(x+w*0.35,y+w*0.15,w*0.35,0,Math.PI*2);
  ctx.arc(x-w*0.3,y+w*0.25,w*0.3,0,Math.PI*2);
  ctx.arc(x+w*0.68,y+w*0.28,w*0.27,0,Math.PI*2);
  ctx.fill();
}

// ── 平台繪製 ──
// 地面平台（g:true）：上層綠草皮 + 下層棕色土磚（帶磚縫紋路 + 草叢裝飾）
// 空中跳台（g:false）：淡棕色石磚 + 白色高光
function drawPlatforms(){
  platforms.forEach(p=>{
    const sx=p.x-camX;
    // 視錐剔除：不在畫面範圍內的平台直接跳過（提升效能）
    if(sx>W+10||sx+p.w<-10) return;
    if(p.g){
      ctx.fillStyle='#66BB6A'; ctx.fillRect(sx,p.y,p.w,15);
      ctx.fillStyle='#8D6E63'; ctx.fillRect(sx,p.y+15,p.w,p.h-15);
      ctx.fillStyle='#795548';
      for(let i=0;i<p.w;i+=26) ctx.fillRect(sx+i,p.y+22,13,p.h-22);
      ctx.fillStyle='#81C784';
      for(let i=8;i<p.w;i+=22){
        ctx.beginPath(); ctx.arc(sx+i,p.y+7,7,Math.PI,0); ctx.fill();
      }
    } else {
      ctx.fillStyle='#A1887F'; ctx.fillRect(sx,p.y,p.w,p.h);
      ctx.strokeStyle='#795548'; ctx.lineWidth=1.5;
      for(let bx=0;bx<p.w;bx+=30) ctx.strokeRect(sx+bx,p.y,30,p.h);
      ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(sx,p.y,p.w,3);
    }
  });
}

// ── 金幣繪製 ──
// 金幣以橢圓模擬「旋轉硬幣」動畫：
//   sc2 = |cos(時間 + x偏移)| ，值域 0~1，代表水平壓縮比例。
//   sc2≈0 時金幣側面（細線），sc2≈1 時正面（完整圓）。
//   每枚金幣的 x 偏移讓它們不同步旋轉，畫面更生動。
function drawCoins(){
  const t=Date.now()*0.006; // 全域時間（秒級）
  coins.forEach(c=>{
    if(c.got) return; // 已撿取不繪製
    const sx=c.x-camX; if(sx<-20||sx>W+20) return; // 視錐剔除
    const sc2=Math.abs(Math.cos(t+c.x*0.08)); // 旋轉壓縮比
    ctx.save(); ctx.translate(sx,c.y);
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.ellipse(0,0,10*sc2,10,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFA000'; ctx.beginPath(); ctx.ellipse(0,0,6*sc2,6,0,0,Math.PI*2); ctx.fill();
    if(sc2>0.35){
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.ellipse(-2.5*sc2,-2.5,2*sc2,2,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

// ── 嬰兒敵人繪製 ──
// drawBaby(e) 繪製單隻嬰兒的完整外觀（Q版卡通風格）：
//   爬行狀態：腿部/手臂依 sin(ct) 往復擺動
//   天降狀態：全身旋轉晃動（wobble），頭頂顯示 "wheee!" 文字
//   元件由後至前繪製（後腿 → 軀幹 → 尿布 → 後手臂 → 前腿 → 前手臂 → 頭部）
function drawBaby(e){
  if(!e.alive) return; // 死亡不繪製
  const sx=e.x-camX; if(sx<-70||sx>W+70) return; // 視錐剔除

  const facingL = e.vx < 0;
  const bob    = e.falling ? 0 : Math.sin(e.ct*0.14)*2.5;
  const limbSw = e.falling ? 0 : Math.sin(e.ct*0.14)*5;

  ctx.save();

  if(e.falling){
    // "wheee!" above baby (drawn before rotation so text stays upright)
    ctx.save();
    ctx.font='bold 12px Arial'; ctx.textAlign='center';
    ctx.fillStyle='#FF5252';
    ctx.fillText('wheee!', sx+e.w/2, e.y-6);
    ctx.restore();
    // wobble rotation around baby center
    const wobble=Math.sin(e.ct*0.18)*0.38;
    ctx.translate(sx+e.w/2, e.y+e.h/2);
    ctx.rotate(wobble);
    ctx.translate(-sx-e.w/2, -e.y-e.h/2);
  }

  // origin: bottom-left of hitbox (same for both falling & crawling)
  ctx.translate(sx, e.y+e.h);

  // flip so baby always faces movement direction
  if(!facingL){ ctx.scale(-1,1); ctx.translate(-e.w,0); }

  // ── BACK LEG (right side, knee bent) ──
  ctx.fillStyle='#FAD9B5';
  ctx.beginPath(); ctx.ellipse(38, -10+limbSw, 9,6, 0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(44, -5+limbSw, 6,0,Math.PI*2); ctx.fill();

  // ── BODY: onesie ──
  ctx.fillStyle='#FFF5F5';
  ctx.beginPath(); ctx.ellipse(26, -18+bob, 18,12,0,0,Math.PI*2); ctx.fill();

  // onesie snap buttons at crotch
  ctx.fillStyle='#ddd';
  ctx.beginPath(); ctx.arc(24,-8+bob,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(30,-8+bob,2.5,0,Math.PI*2); ctx.fill();

  // ── DIAPER ──
  ctx.fillStyle='#E8EAF6';
  ctx.beginPath(); ctx.ellipse(24,-9+bob,14,9,0.1,0,Math.PI*2); ctx.fill();
  // diaper waistband
  ctx.fillStyle='#C5CAE9';
  ctx.fillRect(12,-17+bob,24,5);
  // tape tabs
  ctx.fillStyle='#9FA8DA';
  ctx.fillRect(10,-18+bob,5,6); ctx.fillRect(33,-18+bob,5,6);

  // ── BACK ARM ──
  ctx.fillStyle='#FAD9B5';
  const armUp = e.falling ? 18 : 0; // raise arms when falling
  ctx.beginPath(); ctx.ellipse(40,-23-limbSw-armUp,8,5,e.falling?-0.8:0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(46,-19-limbSw-armUp,5.5,0,Math.PI*2); ctx.fill();

  // ── FRONT LEG ──
  ctx.fillStyle='#FAD9B5';
  ctx.beginPath(); ctx.ellipse(12,-7-limbSw,9,6,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7,-4-limbSw,6,0,Math.PI*2); ctx.fill();

  // ── FRONT ARM ──
  ctx.beginPath(); ctx.ellipse(8,-20+limbSw-armUp,9,5,e.falling?0.8:-0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-17+limbSw-armUp,6,0,Math.PI*2); ctx.fill();

  // ── BIG BABY HEAD ──
  const hx=40, hy=-28+bob, hr=17;
  ctx.fillStyle='#FAD9B5';
  ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill();

  // baby hair (sparse wisps)
  ctx.strokeStyle='#8B6850'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(hx-5,hy-hr); ctx.quadraticCurveTo(hx-8,hy-hr-7,hx-5,hy-hr-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx,hy-hr);   ctx.quadraticCurveTo(hx+2,hy-hr-9,hx,hy-hr-12);   ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+5,hy-hr); ctx.quadraticCurveTo(hx+8,hy-hr-6,hx+6,hy-hr-9);  ctx.stroke();

  // baby eyes (big and innocent)
  ctx.fillStyle='#2A1A0A';
  ctx.beginPath(); ctx.ellipse(hx-7,hy-2,5,5.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+7,hy-2,5,5.5,0,0,Math.PI*2); ctx.fill();
  // eye shine
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(hx-5.5,hy-3.5,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hx+8.5,hy-3.5,2,0,Math.PI*2); ctx.fill();

  // baby blush
  ctx.fillStyle='rgba(255,140,120,0.38)';
  ctx.beginPath(); ctx.ellipse(hx-12,hy+5,6,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+12,hy+5,6,3.5,0,0,Math.PI*2); ctx.fill();

  // open cute mouth + drool
  ctx.fillStyle='#FF9999';
  ctx.beginPath(); ctx.arc(hx,hy+9,5,0.1,Math.PI-0.1); ctx.fill();
  ctx.fillStyle='#FF7777';
  ctx.beginPath(); ctx.arc(hx,hy+10,3,0,Math.PI); ctx.fill();
  // drool drop
  ctx.fillStyle='rgba(180,220,255,0.75)';
  ctx.beginPath(); ctx.arc(hx+3,hy+16,3,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── 終點場景繪製 ──
// drawGoal() 繪製站立胖豬藥師，由後至前依序繪製：
//   1. 地面陰影
//   2. 雙腿（高度減半）+ 蹄子
//   3. 尾巴（從背後捲出）
//   4. 豬身體（增胖：rx=50，縮短：ry=28）
//   5. 左臂（垂下）、右臂（舉旗）
//   6. 藥師白袍（加寬配合胖身，袍身、下擺、V領、翻領、口袋、鈕扣）
//   7. 旗桿 + 帶「藥」字的三角旗
//   8. 豬頭（headY 隨身體縮短向下移，外觀不變）
function drawGoal(){
  const fx=goal.x-camX; if(fx+goal.w<-50||fx>W+50) return;
  const gy2=GY;
  // 豬中心 X；headY = 頭圓心 Y（身體縮短後自然下移）；bodyY = 身體圓心 Y
  const pgx=fx+90;
  const bodyY=gy2-58;   // 身體圓心（腿高30+身體ry28=58）
  const headY=gy2-118;  // 頭圓心（bodyY-ry-head_r = 58+28+32=118）

  // 地面陰影（橢圓投影，隨胖身加寬）
  ctx.fillStyle='rgba(0,0,0,0.13)';
  ctx.beginPath(); ctx.ellipse(pgx,gy2-4,50,8,0,0,Math.PI*2); ctx.fill();

  // ── 雙腿（高度減半：30，比原本60更短粗） ──
  ctx.fillStyle='#E07888';
  rr(pgx-24,gy2-30,19,30,5);  // 左腿
  rr(pgx+5,gy2-30,19,30,5);   // 右腿

  // ── 蹄子（腿底橢圓，略寬） ──
  ctx.fillStyle='#C05868';
  ctx.beginPath(); ctx.ellipse(pgx-14,gy2-2,14,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(pgx+14,gy2-2,14,6,0,0,Math.PI*2); ctx.fill();

  // ── 尾巴（位置隨身體縮短調整，保持捲曲感） ──
  ctx.strokeStyle='#E07888'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(pgx-47,bodyY+10);
  ctx.bezierCurveTo(pgx-66,bodyY-2,pgx-72,bodyY+16,pgx-58,bodyY+26);
  ctx.bezierCurveTo(pgx-48,bodyY+34,pgx-35,bodyY+28,pgx-37,bodyY+20);
  ctx.stroke();

  // ── 豬身體（增胖：rx 32→50；縮短：ry 56→28） ──
  ctx.fillStyle='#F4A0B5';
  ctx.beginPath(); ctx.ellipse(pgx,bodyY,50,28,0,0,Math.PI*2); ctx.fill();

  // ── 左臂（自然垂下，比例隨身體調整） ──
  ctx.strokeStyle='#E07888'; ctx.lineWidth=13; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(pgx-38,bodyY-12);
  ctx.quadraticCurveTo(pgx-56,bodyY+6,pgx-54,bodyY+26);
  ctx.stroke();
  ctx.fillStyle='#D06878';
  ctx.beginPath(); ctx.arc(pgx-54,bodyY+28,7,0,Math.PI*2); ctx.fill();

  // ── 右臂（舉起握旗，彎曲向上） ──
  const armEndX=pgx+58, armEndY=bodyY-52;
  ctx.strokeStyle='#E07888'; ctx.lineWidth=13; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(pgx+38,bodyY-12);
  ctx.quadraticCurveTo(pgx+62,bodyY-18,armEndX,armEndY);
  ctx.stroke();
  ctx.fillStyle='#D06878';
  ctx.beginPath(); ctx.arc(armEndX,armEndY,7,0,Math.PI*2); ctx.fill();

  // ══ 藥師白袍（加寬至96px配合rx=50胖身） ══
  // 袍身主體（圓角矩形，蓋住前胸）
  ctx.fillStyle='#F0F0F0';
  rr(pgx-48,bodyY-30,96,60,8);
  // 袍緣輪廓（淡灰描邊）
  ctx.strokeStyle='#C8C8C8'; ctx.lineWidth=1.2; ctx.stroke();

  // 袍子下擺（蓋住腿根）
  ctx.fillStyle='#F0F0F0';
  rr(pgx-44,gy2-32,88,14,4);

  // V 領開口（露出粉色豬身）
  ctx.fillStyle='#F4A0B5';
  ctx.beginPath();
  ctx.moveTo(pgx,bodyY-28);
  ctx.lineTo(pgx-14,bodyY-4);
  ctx.lineTo(pgx+14,bodyY-4);
  ctx.closePath(); ctx.fill();

  // 翻領左片（稍深灰白）
  ctx.fillStyle='#E2E2E2';
  ctx.beginPath();
  ctx.moveTo(pgx,bodyY-28); ctx.lineTo(pgx-48,bodyY-14);
  ctx.lineTo(pgx-28,bodyY+4); ctx.lineTo(pgx-8,bodyY-4);
  ctx.closePath(); ctx.fill();
  // 翻領右片
  ctx.beginPath();
  ctx.moveTo(pgx,bodyY-28); ctx.lineTo(pgx+48,bodyY-14);
  ctx.lineTo(pgx+28,bodyY+4); ctx.lineTo(pgx+8,bodyY-4);
  ctx.closePath(); ctx.fill();

  // 胸口袋（左胸，含紅十字醫療符號）
  ctx.fillStyle='#E8E8E8';
  rr(pgx-40,bodyY-18,18,14,3);
  ctx.strokeStyle='#E53935'; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(pgx-37,bodyY-11); ctx.lineTo(pgx-26,bodyY-11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pgx-32,bodyY-16); ctx.lineTo(pgx-32,bodyY-6);  ctx.stroke();

  // 白袍鈕扣（3顆，沿中線排列）
  ctx.fillStyle='#A8A8A8';
  [bodyY-4,bodyY+8,bodyY+18].forEach(by=>{
    ctx.beginPath(); ctx.arc(pgx,by,2.5,0,Math.PI*2); ctx.fill();
  });

  // ── 旗桿（從右蹄延伸至頭頂上方） ──
  const fpx=armEndX+6;
  const poleTop=headY-80;  // 旗桿頂端（高出豬頭80px）
  const poleH=gy2-poleTop;
  ctx.fillStyle='rgba(0,0,0,0.10)'; ctx.fillRect(fpx+4,poleTop,5,poleH); // 陰影
  ctx.fillStyle='#9E9E9E';          ctx.fillRect(fpx,poleTop,5,poleH);    // 主桿
  ctx.fillStyle='#E0E0E0';          ctx.fillRect(fpx+1,poleTop,2,poleH);  // 反光

  // 三角旗幟（紅色，向右飄）
  ctx.fillStyle='#E53935';
  ctx.beginPath();
  ctx.moveTo(fpx+5,poleTop+5);
  ctx.lineTo(fpx+60,poleTop+27);
  ctx.lineTo(fpx+5,poleTop+50);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#B71C1C'; ctx.lineWidth=1.2; ctx.stroke();

  // 旗面「藥」字（白色粗體，置中於旗面）
  ctx.save();
  ctx.fillStyle='#FFFFFF';
  ctx.font='bold 24px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('藥',fpx+25,poleTop+27);
  ctx.restore();

  // ── 豬頭（外觀不變，位置隨身體縮短自然下移至 gy2-118） ──
  ctx.fillStyle='#F4A0B5';
  ctx.beginPath(); ctx.arc(pgx,headY,32,0,Math.PI*2); ctx.fill();

  // 耳朵（外耳深粉 + 內耳淡粉，三角形朝上）
  ctx.fillStyle='#E07888';
  ctx.beginPath(); ctx.moveTo(pgx-18,headY-22); ctx.lineTo(pgx-32,headY-50); ctx.lineTo(pgx-6,headY-28); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(pgx+18,headY-22); ctx.lineTo(pgx+32,headY-50); ctx.lineTo(pgx+6,headY-28); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#F9C0CC';
  ctx.beginPath(); ctx.moveTo(pgx-16,headY-25); ctx.lineTo(pgx-26,headY-44); ctx.lineTo(pgx-8,headY-28); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(pgx+16,headY-25); ctx.lineTo(pgx+26,headY-44); ctx.lineTo(pgx+8,headY-28); ctx.closePath(); ctx.fill();

  // 鼻子（橢圓正面豬鼻 + 兩個鼻孔）
  ctx.fillStyle='#E07888';
  ctx.beginPath(); ctx.ellipse(pgx,headY+14,16,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#B03050';
  ctx.beginPath(); ctx.arc(pgx-7,headY+15,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(pgx+7,headY+15,4,0,Math.PI*2); ctx.fill();

  // 眼睛（黑色瞳孔 + 白色高光點）
  ctx.fillStyle='#2D1010';
  ctx.beginPath(); ctx.arc(pgx-13,headY-4,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(pgx+13,headY-4,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(pgx-11,headY-7,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(pgx+15,headY-7,2.2,0,Math.PI*2); ctx.fill();
}

// ── 粒子特效繪製 ──
// 每顆粒子以 4px 半徑圓形繪製，透明度隨 life 線性遞減（life/28），
// 製造淡出消失的效果。繪製後務必將 globalAlpha 還原為 1。
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/28; // life 越小越透明
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x-camX,p.y,4,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; // 還原全域透明度
}

// ══ Q版主角繪製 ══
// drawChar() 繪製主角的完整外觀，由後至前：
//   後背頭髮（長髮）→ 外套身體 → 手臂 → 腿部 → 頭部（含髮型與臉）
//
// 動畫系統：
//   swing  : 行走擺動幅度（sin 函數，在地面且有速度時啟用）
//   isJump : 跳躍狀態（手臂向後仰，腿部不擺動）
//   invTimer : 無敵閃爍（每 6 幀交替顯示/隱藏）
function drawChar(){
  const p=player;
  // sx：角色中心屏幕 x；sy：碰撞箱頂部屏幕 y（= 頭頂）
  const sx=p.x-camX+PW/2, sy=p.y;
  const isJump=!p.onGround;
  // swing：行走時腿/臂的左右擺動量（-7 ~ +7 px）
  const swing=(p.onGround&&Math.abs(p.vx)>0.4)?Math.sin(p.wFrame*0.42)*7:0;
  // 無敵期間每 6 幀閃爍一次（跳過偶數組的繪製）
  if(p.invTimer>0&&Math.floor(p.invTimer/6)%2===0) return;

  ctx.save();
  // 朝左時水平翻轉整個角色（以 sx 為軸鏡像）
  if(p.facing===-1){ ctx.translate(sx*2,0); ctx.scale(-1,1); }

  // ── 後背長髮 ──（繪製在身體最底層，呈現髮絲向下飄的效果）
  ctx.fillStyle='#241509';
  ctx.beginPath();
  ctx.moveTo(sx-18,sy+16);
  ctx.bezierCurveTo(sx-42,sy+35,sx-38,sy+54,sx-22,sy+59);
  ctx.bezierCurveTo(sx-16,sy+61,sx-10,sy+57,sx-14,sy+52);
  ctx.bezierCurveTo(sx-26,sy+47,sx-26,sy+30,sx-20,sy+20);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sx+18,sy+16);
  ctx.bezierCurveTo(sx+42,sy+35,sx+38,sy+54,sx+22,sy+59);
  ctx.bezierCurveTo(sx+16,sy+61,sx+10,sy+57,sx+14,sy+52);
  ctx.bezierCurveTo(sx+26,sy+47,sx+26,sy+30,sx+20,sy+20);
  ctx.closePath(); ctx.fill();

  // ── 外套軀幹 ──（圓角矩形 + 領口暗色三角形 + 中線 + 鈕扣）
  ctx.fillStyle='#C49148'; rr(sx-15,sy+47,30,17,7);
  ctx.fillStyle='#AD7A33';
  ctx.beginPath();
  ctx.moveTo(sx-10,sy+48); ctx.lineTo(sx-4,sy+54);
  ctx.lineTo(sx,sy+51); ctx.lineTo(sx+4,sy+54);
  ctx.lineTo(sx+10,sy+48); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(sx,sy+51); ctx.lineTo(sx,sy+63); ctx.stroke();
  ctx.fillStyle='#bbb'; ctx.beginPath(); ctx.arc(sx,sy+57,1.5,0,Math.PI*2); ctx.fill();

  // ── 手臂 ──
  // armSw：手臂旋轉角度（跳躍時固定後仰 -0.4 rad；行走時隨 swing 微幅擺動）
  const armSw=isJump?-0.4:swing*0.018;
  ctx.save(); ctx.translate(sx-17,sy+51); ctx.rotate(-armSw);
  ctx.fillStyle='#C49148'; ctx.beginPath(); ctx.ellipse(0,5,6,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#F2C4A0'; ctx.beginPath(); ctx.arc(0,11,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.translate(sx+17,sy+51); ctx.rotate(armSw);
  ctx.fillStyle='#C49148'; ctx.beginPath(); ctx.ellipse(0,5,6,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#F2C4A0'; ctx.beginPath(); ctx.arc(0,11,4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── 腿部與鞋子 ──
  // ls：腿部擺動量（跳躍時歸零，行走時 = swing）
  // 左腿 -ls*0.5、右腿 +ls*0.5 製造交替擺動效果
  const ls=isJump?0:swing;
  ctx.fillStyle='#3A2510';
  rr(sx-13,sy+63-ls*0.5,11,9,3); rr(sx+2,sy+63+ls*0.5,11,9,3);
  ctx.fillStyle='#1c0d04';
  ctx.beginPath(); ctx.ellipse(sx-8,sy+72-ls*0.5,9,4,0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx+8,sy+72+ls*0.5,9,4,-0.1,0,Math.PI*2); ctx.fill();

  // ── 頭部繪製 ──
  // 頭部由後至前：底色膚色圓 → 髮冠（上半弧）→ 瀏海貝茲曲線 → 下臉補色 → 臉部（照片或預設繪製）
  // hcx / hcy : 頭部圓心螢幕座標；hr : 頭部半徑（23px）
  const hcx=sx, hcy=sy+23, hr=23;

  // head base skin
  ctx.fillStyle='#FAD9B5';
  ctx.beginPath(); ctx.arc(hcx,hcy,hr,0,Math.PI*2); ctx.fill();

  // hair crown
  ctx.fillStyle='#241509';
  ctx.beginPath(); ctx.arc(hcx,hcy-2,hr+1.5,Math.PI*1.1,Math.PI*1.9); ctx.fill();

  // bangs
  ctx.fillStyle='#241509';
  ctx.beginPath();
  ctx.moveTo(hcx-hr,hcy-6);
  ctx.bezierCurveTo(hcx-hr+1,hcy-22, hcx-8,hcy-17, hcx-1,hcy-10);
  ctx.bezierCurveTo(hcx+3,hcy-14, hcx+hr-4,hcy-21, hcx+hr,hcy-6);
  ctx.quadraticCurveTo(hcx+hr-1,hcy-3, hcx+21,hcy-2);
  ctx.quadraticCurveTo(hcx+10,hcy-12, hcx+3,hcy-8);
  ctx.quadraticCurveTo(hcx-6,hcy-12, hcx-21,hcy-2);
  ctx.quadraticCurveTo(hcx-hr+1,hcy-3, hcx-hr,hcy-6);
  ctx.closePath(); ctx.fill();

  // lower face re-draw
  ctx.fillStyle='#FAD9B5';
  ctx.beginPath(); ctx.ellipse(hcx,hcy+4,hr-1,hr-3,0,0,Math.PI); ctx.fill();

  // ── 臉部：照片模式 vs 預設繪製模式 ──
  if(faceImg){
    ctx.save();
    // 以略小於頭部的圓形做裁切（clip），防止照片超出頭部輪廓
    ctx.beginPath(); ctx.arc(hcx,hcy+4,hr-3,0,Math.PI*2); ctx.clip();
    // 從照片頂部中央裁取正方形區域（對應自拍臉部位置）
    const iw=faceImg.width, ih=faceImg.height;
    const cropW=iw;
    const cropH=Math.min(ih,iw*1.1); // slightly taller than square to get chin
    const cropX=0;
    const cropY=0; // from top
    const drawR=(hr-3);
    ctx.drawImage(faceImg, cropX,cropY,cropW,cropH,
                           hcx-drawR, hcy+4-drawR, drawR*2, drawR*2);
    // soft vignette edge
    const vigG=ctx.createRadialGradient(hcx,hcy+4,drawR*0.65,hcx,hcy+4,drawR);
    vigG.addColorStop(0,'rgba(0,0,0,0)');
    vigG.addColorStop(1,'rgba(0,0,0,0.18)');
    ctx.fillStyle=vigG; ctx.fillRect(hcx-drawR,hcy+4-drawR,drawR*2,drawR*2);
    ctx.restore();
  } else {
    // default drawn face
    ctx.fillStyle='#16090A';
    ctx.beginPath(); ctx.ellipse(hcx-9,hcy+4,5.5,6.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hcx+9,hcy+4,5.5,6.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(hcx-7.5,hcy+1,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hcx+10.5,hcy+1,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,130,130,0.32)';
    ctx.beginPath(); ctx.ellipse(hcx-16,hcy+11,7,4,-0.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hcx+16,hcy+11,7,4, 0.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#E8A090'; ctx.beginPath(); ctx.arc(hcx,hcy+14,1.8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#C06070'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(hcx,hcy+18,5,0.2,Math.PI-0.2); ctx.stroke();
  }

  ctx.restore();
}

// ── 覆蓋畫面繪製 ──
// drawOverlay() 在主場景之上繪製半透明遮罩與文字，
// 分三種狀態：start（開始說明）、win（過關）、gameover（遊戲結束）。
// 非 playing 時直接 return 以減少不必要的繪製。
function drawOverlay(){
  if(gameState==='start'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    // ── 冒險逃脫標題 "Rabee's Big Escape" ──
    ctx.save();
    ctx.textAlign='center';
    ctx.font='bold italic 64px Impact,"Arial Black",Arial';

    // 最底層：深藍描邊（圓角，卡通輪廓線）
    ctx.strokeStyle='#0a1040';
    ctx.lineWidth=14;
    ctx.lineJoin='round';
    ctx.strokeText("Rabee's Big Escape",W/2,148);

    // 深色陰影（右下偏移，厚重立體感）
    ctx.fillStyle='rgba(10,20,80,0.80)';
    ctx.fillText("Rabee's Big Escape",W/2+5,154);

    // 主體：鮮亮橙色（活力動感）
    ctx.fillStyle='#FF7700';
    ctx.fillText("Rabee's Big Escape",W/2,148);

    // 頂部高光漸層（金黃光澤，由上往下淡出）
    const tg=ctx.createLinearGradient(0,98,0,152);
    tg.addColorStop(0,'rgba(255,240,80,0.70)');
    tg.addColorStop(1,'rgba(255,160,0,0)');
    ctx.fillStyle=tg;
    ctx.fillText("Rabee's Big Escape",W/2,148);

    // 裝飾：金色四角星閃光（散布於標題四周，強調冒險感）
    // 四角星以兩個交叉橢圓繪製（垂直細長 + 水平細長）
    const stars=[
      {x:W/2-230,y:118,r:9 },{x:W/2-180,y:158,r:6},
      {x:W/2-105,y:108,r:11},{x:W/2-30, y:160,r:6},
      {x:W/2+55,  y:106,r:10},{x:W/2+125,y:158,r:6},
      {x:W/2+195, y:115,r:8 },{x:W/2+242,y:150,r:6},
    ];
    stars.forEach(s=>{
      // 外層：金色
      ctx.fillStyle='#FFD700';
      ctx.save(); ctx.translate(s.x,s.y);
      ctx.beginPath(); ctx.ellipse(0,0,s.r*0.22,s.r,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,0,s.r,s.r*0.22,0,0,Math.PI*2); ctx.fill();
      // 中心亮點：白色
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(0,0,s.r*0.22,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });
    // 散落小金點（增加閃爍質感）
    ctx.fillStyle='rgba(255,220,80,0.75)';
    [{x:W/2-210,y:140},{x:W/2+168,y:136},{x:W/2-72,y:102},{x:W/2+88,y:163}].forEach(p=>{
      ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
    ctx.fillStyle='white'; ctx.font='20px Microsoft JhengHei,Arial';
<!--    ctx.fillText('← → 移動    Space鍵 跳躍',W/2,220);-->
<!--    ctx.fillText('小心蝦蛆寶！',W/2,255);-->
<!--    ctx.fillText('收集所有金幣，抵達終點旗幟',W/2,290);-->
    ctx.fillStyle='#FFE082'; ctx.font='16px Microsoft JhengHei,Arial';
<!--    ctx.fillText('⚠️ 空中也會隨機掉落嬰兒，小心！',W/2,340); -->
        ctx.fillText('Vol.1 前往豬藥局！',W/2,255);
    ctx.fillStyle='#B2EBF2'; ctx.font='bold 24px Microsoft JhengHei,Arial';
    ctx.fillText('← → 移動   Space 跳躍',W/2,400);
    ctx.fillText('Enter 開始遊戲',W/2,435);
    return;
  }
  if(gameState==='win'){
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.font='bold 56px Microsoft JhengHei,Arial';
    ctx.fillText('🎉 恭喜過關！',W/2,165);
    ctx.fillStyle='white'; ctx.font='bold 27px Microsoft JhengHei,Arial';
    ctx.fillText('最終分數：'+score,W/2,245);
    ctx.fillText('收集金幣：'+coinsCnt+' / '+TOTAL_COINS,W/2,290);
    ctx.fillStyle='#B2EBF2'; ctx.font='20px Microsoft JhengHei,Arial';
    ctx.fillText('按 R 重新開始',W/2,360);
    return;
  }
  if(gameState==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#FF5252'; ctx.font='bold 58px Microsoft JhengHei,Arial';
    ctx.fillText('遊戲結束',W/2,175);
    ctx.fillStyle='white'; ctx.font='bold 27px Microsoft JhengHei,Arial';
    ctx.fillText('分數：'+score,W/2,255);
    ctx.fillText('金幣：'+coinsCnt+' / '+TOTAL_COINS,W/2,298);
    ctx.fillStyle='#FFCDD2'; ctx.font='20px Microsoft JhengHei,Arial';
    ctx.fillText('按 R 重新開始',W/2,365);
    return;
  }
}

// resetGame()：按 R 鍵觸發，將所有遊戲狀態完全重置：
//   - 分數/生命/金幣數歸零、狀態切回 playing
//   - 攝影機歸位、粒子清空、天降計時器重置
//   - 從 coinDefs / babyDefs 重新生成活躍的金幣與敵人物件
//   - 重建主角物件並重新整合 UI
function resetGame(){
  score=0; lives=4; coinsCnt=0; gameState='playing'; camX=0; particles=[];
  skyTimer=0;
  // 從定義陣列映射出帶有動態狀態的物件（展開語法複製避免污染原始定義）
  coins=coinDefs.map((c,i)=>({...c,id:i,got:false}));
  enemies=babyDefs.map(e=>({...e,vy:0,alive:true,ct:0,falling:false}));
  player=mkPlayer(); updateUI();
  document.getElementById('pg').textContent='0%';
}

// ══ 主迴圈 ══
// loop() 由瀏覽器 requestAnimationFrame 每幀（≈60fps）自動呼叫。
// 繪製順序（由遠至近，確保正確的疊層關係）：
//   1. 清除畫布
//   2. 背景（天空、山、雲）
//   3. 平台（地面、跳台）
//   4. 終點場景（圍欄、豬、旗幟）
//   5. 金幣
//   6. 嬰兒敵人（全部）
//   7. 主角（playing/win/gameover 均顯示，讓玩家看到最終姿態）
//   8. 粒子特效
//   9. 覆蓋畫面（start/win/gameover 文字）
//  10. 物理/邏輯更新（僅 playing 狀態）
//  11. 排程下一幀
function loop(){
  ctx.clearRect(0,0,W,H); // 清除整個畫布
  drawBg(); drawPlatforms(); drawGoal(); drawCoins();
  enemies.forEach(e=>drawBaby(e));
  if(gameState==='playing'||gameState==='win'||gameState==='gameover') drawChar();
  drawParticles(); drawOverlay();
  if(gameState==='playing') update(); // 遊戲邏輯僅在 playing 時執行
  requestAnimationFrame(loop); // 排程下一幀
}

// ── 遊戲啟動（Boot）──
// 在所有定義完成後執行一次初始化，然後啟動主迴圈。
// 這段程式碼只在頁面載入時執行一次（之後由 resetGame() 重置）。
coins   = coinDefs.map((c,i)=>({...c,id:i,got:false})); // 初始化金幣
enemies = babyDefs.map(e=>({...e,vy:0,alive:true,ct:0,falling:false})); // 初始化敵人
player  = mkPlayer(); // 建立主角
updateUI();  // 更新 HTML UI 顯示初始數值
loop();      // 啟動主迴圈
</script>
